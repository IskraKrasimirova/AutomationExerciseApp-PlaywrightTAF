name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release

    # -------------------------
    # API TESTS
    # -------------------------
    - name: Run API tests
      run: dotnet test AutomationApp.ApiTests/AutomationApp.ApiTests.csproj --logger "trx;LogFileName=api-tests.trx"

    # -------------------------
    # UI TESTS 
    # -------------------------
    - name: Run UI tests
      if: always()
      run: dotnet test AutomationApp.UiTests/AutomationApp.UiTests.csproj --logger "trx;LogFileName=ui-tests.trx"

    # -------------------------
    # Collect Allure Results
    # -------------------------
    - name: Upload Allure Results (API)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-api
        path: AutomationApp.ApiTests/bin/Debug/net8.0/allure-results

    - name: Upload Allure Results (UI)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-ui
        path: AutomationApp.UiTests/bin/Debug/net8.0/allure-results

    # -------------------------
    # Generate Allure Report
    # -------------------------
    - name: Install Allure CLI
      if: always()
      run: npm install -g allure-commandline --save-dev

    - name: Merge Allure Results
      if: always()
      run: |
        mkdir merged-results
        cp -r AutomationApp.ApiTests/bin/Debug/net8.0/allure-results/* merged-results/ || true
        cp -r AutomationApp.UiTests/bin/Debug/net8.0/allure-results/* merged-results/ || true

    - name: Generate Allure HTML report
      if: always()
      run: allure generate merged-results -o allure-report --clean

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

