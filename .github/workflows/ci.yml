name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 9 * * Mon"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: BUILD + TEST (matrix)
  # ---------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy

    env:
     HOME: /root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release

    - name: Clean Allure results (API)
      run: rm -rf AutomationApp.ApiTests/bin/Debug/net8.0/allure-results/* || true

    - name: Clean Allure results (UI)
      run: rm -rf AutomationApp.UiTests/bin/Debug/net8.0/allure-results/* || true

    - name: Clean Allure results (UI per browser)
      run: rm -rf AutomationApp.UiTests/bin/Debug/net8.0/allure-results-${{ matrix.browser }} || true

    # -------------------------
    # API TESTS
    # -------------------------
    - name: Run API tests
      run: dotnet test AutomationApp.ApiTests/AutomationApp.ApiTests.csproj --logger "trx;LogFileName=api-tests.trx"

    # -------------------------
    # UI TESTS (matrix)
    # -------------------------
    - name: Run UI tests
      if: always()
      continue-on-error: true
      run: dotnet test AutomationApp.UiTests/AutomationApp.UiTests.csproj --logger "trx;LogFileName=ui-tests-${{ matrix.browser }}.trx"
      env:
        BROWSER: ${{ matrix.browser }}

    - name: Organize Allure results to browser-specific folder
      if: always()
      run: |
        mkdir -p AutomationApp.UiTests/bin/Debug/net8.0/allure-results-${{ matrix.browser }}
        mv AutomationApp.UiTests/bin/Debug/net8.0/allure-results/* AutomationApp.UiTests/bin/Debug/net8.0/allure-results-${{ matrix.browser }} || true

    - name: Add Allure environment file
      if: always()
      run: |
        echo "browser=${{ matrix.browser }}" > AutomationApp.UiTests/bin/Debug/net8.0/allure-results-${{ matrix.browser }}/environment.properties

    # -------------------------
    # Upload Allure Results
    # -------------------------
    - name: Upload Allure Results (API)
      if: matrix.browser == 'chromium'
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-api
        path: AutomationApp.ApiTests/bin/Debug/net8.0/allure-results

    - name: Upload Allure Results (UI)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-ui-${{ matrix.browser }}
        path: AutomationApp.UiTests/bin/Debug/net8.0/allure-results-${{ matrix.browser }}

    - name: Upload TRX (UI)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-tests-trx-${{ matrix.browser }}
        path: AutomationApp.UiTests/TestResults

  # ---------------------------------------------------------
  # JOB 2: GENERATE ALLURE REPORT (single job)
  # ---------------------------------------------------------
  generate-report:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    container:
        image: mcr.microsoft.com/playwright:v1.58.0-jammy

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Download API results
    - name: Download Allure Results (API)
      uses: actions/download-artifact@v4
      with:
        name: allure-results-api
        path: merged-results

    # Download UI results for all browsers
    - name: Download Allure Results (UI Chromium)
      uses: actions/download-artifact@v4
      with:
        name: allure-results-ui-chromium
        path: merged-results/chromium

    - name: Download Allure Results (UI Firefox)
      uses: actions/download-artifact@v4
      with:
        name: allure-results-ui-firefox
        path: merged-results/firefox

    - name: Download Allure Results (UI WebKit)
      uses: actions/download-artifact@v4
      with:
        name: allure-results-ui-webkit
        path: merged-results/webkit

    - name: Merge Allure results
      run: |
        mkdir -p merged-results/all
        cp -r merged-results/chromium/* merged-results/all/ 2>/dev/null || true
        cp -r merged-results/firefox/* merged-results/all/ 2>/dev/null || true
        cp -r merged-results/webkit/* merged-results/all/ 2>/dev/null || true
        cp merged-results/*.json merged-results/all/ 2>/dev/null || true

    - name: Create environment properties
      run: |
        echo "Browsers=chromium, firefox, webkit" > merged-results/all/environment.properties
        echo "Platform=Ubuntu" >> merged-results/all/environment.properties
        echo "Framework=Playwright + NUnit" >> merged-results/all/environment.properties
        echo "Language=C#" >> merged-results/all/environment.properties

    - name: Install Allure CLI
      run: npm install -g allure-commandline --save-dev

    - name: Copy history from previous report
      run: |
        if [ -d allure-report/history ]; then
          cp -a allure-report/history merged-results/history || true
        fi

    - name: Install Java
      run: |
        apt-get update
        apt-get install -y default-jre

    - name: Generate Allure HTML report
      run: allure generate merged-results/all -o allure-report --clean

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
